# Use the latest stable version of Semaphore 2.0 YML syntax:
version: v1.0
name: Chess backend
agent:
  machine:
    type: a2-standard-4
    os_image: ubuntu2204

# Blocks are the heart of a pipeline and are executed sequentially.
# Each block has a task that defines one or more jobs. Jobs define the
# commands to execute.
# See https://docs.semaphoreci.com/article/62-concepts
blocks:
  - name: Build project
    task:
      jobs:
      - name: go get & build
        commands:
          - checkout

          # Set version of Go:
          - sem-version go 1.28
          - go get
          - go build -o ./bin/main

          # Store the binary in cache to reuse in further blocks.
          # More about caching: https://docs.semaphoreci.com/article/54-toolbox-reference#cache
          - cache store $(checksum main.go) bin

  - name: Run tests
    task:
      # This block runs two jobs in parallel and they both share common
      # setup steps. We can group them in a prologue.
      # See https://docs.semaphoreci.com/article/50-pipeline-yaml#prologue
      prologue:
        commands:
          - checkout
          - sem-version go 1.26
      jobs:
      - name:  go test ./... -v
        commands:
          # Start Postgres database service.
          # See https://docs.semaphoreci.com/ci-cd-environment/sem-service-managing-databases-and-services-on-linux/
          - sem-service start postgres
          - psql -p 5432 -h localhost -U postgres -c "CREATE DATABASE s2"
          - go get gotest.tools/gotestsum
          - gotestsum --junitfile junit.xml ./...

      - name: Test web server
        commands:
          # Restore compiled binary which we created in the first block:
          - cache restore $(checksum main.go)
          - ./bin/main 8080 &
          - curl --silent localhost:8080/time | grep "The current time is"
      epilogue:
        always:
          commands:
            - test-results publish junit.xml

after_pipeline:
  task:
    jobs:
      - name: Publish Results
        commands:
          - test-results gen-pipeline-report
